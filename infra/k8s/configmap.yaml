apiVersion: v1
kind: ConfigMap
metadata:
  name: arcsphere3d-config
  namespace: arcsphere3d
data:
  DATABASE_URL: "postgresql+psycopg://arc:$(POSTGRES_PASSWORD)@postgres:5432/arcsphere3d"
  S3_ENDPOINT_URL: "http://minio:9000"
  S3_BUCKET: "arcsphere3d"
  CORS_ORIGINS: "https://arcsphere3d.example.com"
  APP_NAME: "ArcSphere3D"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  JWT_ALGORITHM: "RS256"

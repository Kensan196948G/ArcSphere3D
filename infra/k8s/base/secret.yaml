apiVersion: v1
kind: Secret
metadata:
  name: arcsphere3d-secret
  namespace: arcsphere3d
  annotations:
    # In production, replace this Secret with an ExternalSecret (external-secrets-operator)
    # pointing to your vault / cloud secret manager. Never commit real credentials.
    # See overlays/prod for a fail-closed ExternalSecret example (ADR-0004 #3).
    arcsphere3d/secret-source: placeholder
type: Opaque
# Using stringData so values are human-readable placeholders; Kubernetes
# base64-encodes them automatically. This avoids hand-encoding mistakes
# (e.g. malformed base64 that makes `kubectl apply` reject the whole Secret).
# REPLACE every value below before deploying to any real environment.
stringData:
  POSTGRES_USER: arc
  POSTGRES_PASSWORD: CHANGE_ME_postgres_password
  # MinIO ROOT credentials. Used ONLY by the MinIO server and the provisioning
  # Job (minio-provision.yaml). NEVER handed to the application (ADR-0004 #1).
  S3_ROOT_USER: CHANGE_ME_minio_root_user
  S3_ROOT_PASSWORD: CHANGE_ME_minio_root_password
  # Application-scoped S3 credentials. The provisioning Job creates a MinIO
  # service user with these keys and a policy limited to the arcsphere3d bucket
  # (s3:*Object on arcsphere3d/*). The backend uses these — not root.
  S3_ACCESS_KEY: CHANGE_ME_s3_app_access_key
  S3_SECRET_KEY: CHANGE_ME_s3_app_secret_key
  # Redis AUTH password (--requirepass). Defense in depth: even though the
  # in-memory rate limiter does not use Redis yet, an unauthenticated Redis on
  # the cluster network is a risk (ADR-0004 #2).
  REDIS_PASSWORD: CHANGE_ME_redis_password
  # RS256 key pair (PEM). Key names MUST end with _PEM to match the backend
  # settings field (config.py: jwt_private_key_pem -> env JWT_PRIVATE_KEY_PEM).
  # Generate with:
  #   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt_private.pem
  #   openssl rsa -in jwt_private.pem -pubout -out jwt_public.pem
  JWT_PRIVATE_KEY_PEM: CHANGE_ME_rs256_private_key_pem
  JWT_PUBLIC_KEY_PEM: CHANGE_ME_rs256_public_key_pem

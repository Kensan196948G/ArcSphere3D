apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base kustomization for the ArcSphere3D stack (Issue #240, ADR-0003 follow-up).
# Apply with:  kubectl apply -k infra/k8s/base
# Override per environment with overlays that reference this base via:
#   resources: [../../base]
namespace: arcsphere3d

commonLabels:
  app.kubernetes.io/part-of: arcsphere3d
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - redis.yaml
  - minio.yaml
  - minio-provision.yaml
  - backend.yaml

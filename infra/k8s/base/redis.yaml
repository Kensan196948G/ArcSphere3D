apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: arcsphere3d
  labels:
    app: redis
    app.kubernetes.io/part-of: arcsphere3d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          # Require AUTH (ADR-0004 #2). $(REDIS_PASSWORD) interpolates the env
          # var declared below (Kubernetes substitutes vars declared earlier).
          args: ["--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: REDIS_PASSWORD
            # redis-cli reads REDISCLI_AUTH automatically, so the probe below
            # authenticates without exposing the password in the process args.
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: arcsphere3d
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: arcsphere3d
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: arcsphere3d
  labels:
    app: minio
    app.kubernetes.io/part-of: arcsphere3d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-10-13T13-34-11Z
          args: [server, /data, --console-address, ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            # ROOT credentials stay on the MinIO server only. The application
            # receives scoped keys (S3_ACCESS_KEY/S3_SECRET_KEY) provisioned by
            # minio-provision.yaml — root is never handed to the app (ADR-0004 #1).
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: S3_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: S3_ROOT_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: minio-data
              mountPath: /data
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: arcsphere3d
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

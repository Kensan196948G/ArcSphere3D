apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: arcsphere3d
  labels:
    app: backend
    app.kubernetes.io/part-of: arcsphere3d
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          # TODO(security): overlay/release CI で commit SHA / digest に pin する。
          # mutable :latest は本番不可 (ADR-0004 security backlog #5)。
          image: ghcr.io/kensan196948g/arcsphere3d/backend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: arcsphere3d-config
          env:
            # POSTGRES_USER/PASSWORD are defined before DATABASE_URL so the
            # $(VAR) interpolation below can resolve them (Kubernetes only
            # substitutes variables declared earlier in the same env list).
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/arcsphere3d
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: S3_SECRET_KEY
            # Env var names MUST match the backend settings fields
            # (config.py: jwt_private_key_pem -> JWT_PRIVATE_KEY_PEM). The old
            # JWT_PRIVATE_KEY (no _PEM) was silently ignored, degrading prod to
            # ephemeral per-pod keys (Issue #246).
            - name: JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: JWT_PRIVATE_KEY_PEM
            - name: JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: arcsphere3d-secret
                  key: JWT_PUBLIC_KEY_PEM
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            # readOnlyRootFilesystem requires a writable /tmp for upload
            # buffering and temp files.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: arcsphere3d
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000

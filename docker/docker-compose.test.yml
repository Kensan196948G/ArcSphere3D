name: arcsphere3d-test

# Isolated test stack — ports differ from dev to allow both stacks to coexist.
# db-test: 5433  |  minio-test: 9100  |  backend-test: 8001
#
# JWT_PRIVATE_KEY_PEM / JWT_PUBLIC_KEY_PEM are intentionally empty so
# security.py auto-generates an ephemeral RSA keypair for the test process.
# APP_ENV=test places the app in DEV_ENVS, enabling demo user seeding.

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arcsphere
      POSTGRES_PASSWORD: arcsphere
      POSTGRES_DB: arcsphere_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcsphere -d arcsphere_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-test:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: arctest
      MINIO_ROOT_PASSWORD: arctest-secret-key
    ports:
      - "9100:9000"
      - "9101:9101"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init-test:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio-test:9000 arctest arctest-secret-key &&
        mc mb --ignore-existing minio/arcsphere-test &&
        mc anonymous set public minio/arcsphere-test &&
        echo 'MinIO bucket ready'
      "

  backend-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://arcsphere:arcsphere@db-test:5432/arcsphere_test
      APP_ENV: test
      JWT_PRIVATE_KEY_PEM: ""
      JWT_PUBLIC_KEY_PEM: ""
      JWT_ALGORITHM: RS256
      JWT_ACCESS_TOKEN_TTL_MINUTES: "60"
      S3_ENDPOINT_URL: http://minio-test:9000
      S3_ACCESS_KEY: arctest
      S3_SECRET_KEY: arctest-secret-key
      S3_BUCKET: arcsphere-test
      CORS_ORIGINS: "http://localhost:5173,http://localhost:4173"
      LOG_LEVEL: WARNING
    ports:
      - "8001:8000"
    depends_on:
      db-test:
        condition: service_healthy
      minio-init-test:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

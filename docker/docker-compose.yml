name: arcsphere3d

services:
  db:
    image: postgres:16-alpine
    container_name: arc-db
    environment:
      POSTGRES_DB: arcsphere3d
      POSTGRES_USER: arc
      POSTGRES_PASSWORD: arc
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arc -d arcsphere3d"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: arc-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: arc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: arc
      MINIO_ROOT_PASSWORD: arc-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    container_name: arc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 arc arc-secret &&
      mc mb -p local/arcsphere3d || true &&
      mc anonymous set download local/arcsphere3d || true &&
      echo 'minio bucket ready';
      "

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: arc-backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://arc:arc@db:5432/arcsphere3d
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: arc
      S3_SECRET_KEY: arc-secret
      S3_BUCKET: arcsphere3d
      CORS_ORIGINS: http://localhost:5173,http://localhost
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.frontend
    container_name: arc-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  db_data:
  minio_data:

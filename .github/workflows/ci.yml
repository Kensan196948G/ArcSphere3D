name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci || npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  e2e:
    name: e2e (Playwright / Firefox)
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci || npm install --no-audit --no-fund

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox

      - name: Run E2E tests
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  backend:
    name: backend (ruff + mypy + pytest + coverage)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arcsphere
          POSTGRES_PASSWORD: arcsphere
          POSTGRES_DB: arcsphere_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: |
          ruff check --output-format=github .
          ruff check --output-format=json . > ruff-report.json || true

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy app

      - name: Pytest with coverage
        run: pytest -q --cov=app --cov-report=xml --cov-report=html
        env:
          DATABASE_URL: postgresql+psycopg://arcsphere:arcsphere@localhost:5432/arcsphere_test

      - name: Coverage badge
        run: genbadge coverage -i coverage.xml -o coverage-badge.svg

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            backend/htmlcov
            backend/coverage.xml
            backend/coverage-badge.svg
          retention-days: 14

      - name: Upload lint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-report
          path: backend/ruff-report.json
          retention-days: 7
